<div class="producto-card">
  <div class="producto-top">
    <div>
      <p class="producto-id mb-1">Producto #{{ producto.id }}</p>
      <h4 class="producto-nombre mb-0">{{ producto.nombre }}</h4>
    </div>

    <div class="stock-badge">
        Stock: {{ producto.stock }} - {{ producto.stock | estadoStock }}
    </div>
  </div>

  <div class="producto-bottom">
    <div class="precio-box">
      <span>Precio</span>
      <strong>${{ producto.precio }}</strong>
    </div>

    <div class="acciones-box">
      <a
        class="btn btn-primary btn-sm"
        [routerLink]="['/producto', producto.id]"
      >
        Ver detalle
      </a>

      <a
        class="btn btn-outline-primary btn-sm"
        [routerLink]="['/editar', producto.id]"
      >
        Editar
      </a>

      <button
        class="btn btn-outline-danger btn-sm"
        (click)="eliminar.emit(producto.id)"
      >
        Eliminar
      </button>
    </div>
  </div>
</div>
